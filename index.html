<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Pribadi Mahasiswa - Portofolio Interaktif</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f5f3ff',
                            100: '#edd1ff',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style Animations -->
    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        h1, h2, h3 {
            font-family: 'Poppins', sans-serif;
        }
        .glass-nav {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .dark .glass-nav {
            background-color: rgba(15, 23, 42, 0.85);
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 min-h-screen pt-20">
    <!-- Navbar -->
    <nav class="glass-nav fixed top-0 left-0 right-0 z-50 border-b border-slate-200/50 dark:border-slate-800/50 transition-all">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="#" class="font-bold text-xl tracking-tight bg-gradient-to-r gold text-transparent bg-clip-text">CyberPortfolio</a>
            <div class="flex items-center gap-4">
                <button id="themeToggle" class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center hover:scale-105 transition-all text-slate-600 dark:text-slate-300">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="max-w-5xl mx-auto px-4 py-16 text-center">
        <div class="relative w-32 h-32 mx-auto mb-6 rounded-full overflow-hidden ring-4 ring-purple-500/30 shadow-lg animate-float">
            <img src="https://i.postimg.cc/T3cDvXNx/Chat-GPT-Image-Jun-26-2026-10-04-31-AM.png" alt="Foto Profil Arif" class="w-full h-full object-cover">
        </div>
        <h1 class="text-4xl md:text-5xl font-extrabold mb-3 tracking-tight bg-gradient-to-r from-purple-600 to-indigo-500 dark:from-purple-400 dark:to-indigo-300 text-transparent bg-clip-text">ARIF NUR ROHMAN</h1>
        <p class="text-lg text-slate-600 dark:text-slate-400 max-w-xl mx-auto font-medium">Mahasiswa Pendidikan Matematika | Universitas Muhammadiyah Pringsewu</p>
    </header>

    <script>
        // Theme Toggle logic
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            if (document.documentElement.classList.contains('dark')) {
                localStorage.theme = 'dark';
            } else {
                localStorage.theme = 'light';
            }
        });
    </script>
</body>
</html>
